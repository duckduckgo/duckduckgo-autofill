<!-- https://login.app.carta.com/registration/ -->
<form data-testid="auth-form">
  <p>The invitation you are trying to use could not be identified.</p>

  <label for="username">Email</label>
  <input id="username" type="email" autocomplete="off" data-manual-scoring="username" />

  <label for="password">Password</label>
  <input id="password" type="password" autocomplete="off" data-manual-scoring="password.current" />

  <button type="submit" data-manual-submit>Log in</button>
</form>
